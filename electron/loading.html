<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NexPOS Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 24px;
    user-select: none;
  }
  .logo {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    color: #f97316;
  }
  .sub {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #1e293b;
    border-top-color: #f97316;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 8px;
  }
  .msg { font-size: 12px; color: #475569; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">NexPOS Pro</div>
  <div class="sub">Soulties Jamaican Seafood Eatery</div>
  <div class="spinner"></div>
  <div class="msg">Starting up…</div>
</body>
</html>
